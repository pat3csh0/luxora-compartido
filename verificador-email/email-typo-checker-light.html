  // ── Garbage tail: root conocido + basura detras ────────────
  const ROOT_GARBAGE_RULES = [
    ['gmail.com',     []],
    ['googlemail.com',[]],
    ['hotmail.com',   ['.mx','.ar','.br']],
    ['hotmail.es',    []],
    ['outlook.com',   ['.br','.mx','.ar']],

    ['me.com',        []],

  // Sorted longest-first: 'hotmail.com' se evalua antes que 'me.com' en startsWith
  ].sort((a,b) => b[0].length - a[0].length);

  function stripGarbageTail(domain) {
    for (const [root, allowed] of ROOT_GARBAGE_RULES) {
      if (domain === root) return domain;
      if (domain.startsWith(root)) {
        const rest = domain.slice(root.length);
        if (rest === '' || allowed.includes(rest)) return domain;
        return root;
      }
    }
    return domain;

  // ── Sift3 distance (misma familia que Mailcheck.js) ────────
  // O(n), maneja transposiciones implicitamente, mas rapido que
  // Levenshtein O(n²). maxOffset=5 igual que Mailcheck.
  function sift3(s1, s2) {
    if (!s1) return s2 ? s2.length : 0;
    if (!s2) return s1.length;
    var l1 = s1.length, l2 = s2.length;
    var c1 = 0, c2 = 0, lcs = 0, maxOff = 5;
    while (c1 < l1 && c2 < l2) {
      if (s1[c1] === s2[c2]) { lcs++; }
      else {
        for (var i = 1; i < maxOff; i++) {
          if (c1 + i < l1 && s1[c1 + i] === s2[c2]) { c1 += i; lcs++; break; }
          if (c2 + i < l2 && s1[c1] === s2[c2 + i]) { c2 += i; lcs++; break; }
        }
      }
      c1++; c2++;
    }
    return (l1 + l2) / 2 - lcs;
  }

  function suggestDomain(domain) {
    if (KNOWN_SET.has(domain)) return null;
    // Threshold 3: max Sift3 distance aceptable (>3 produce falsos positivos)
    var best = null, bestDist = 3;
    for (var i = 0; i < KNOWN_DOMAINS.length; i++) {
      var d = sift3(domain, KNOWN_DOMAINS[i]);
      if (d < bestDist) { bestDist = d; best = KNOWN_DOMAINS[i]; }
    }
    return best;
  }

  // ── SLD+TLD split matching (inspirado en Mailcheck.js) ─────
  // Evalua la parte antes del primer punto (SLD) y la parte
  // despues (TLD) por separado. Permite detectar compound errors
  // sin necesitar entradas en TYPO_MAP para cada combinacion.
  function splitDomain(domain) {
    var idx = domain.indexOf('.');
    if (idx < 1) return null;
    return { sld: domain.substring(0, idx), tld: domain.substring(idx + 1) };
  }

  function suggestSplitMatch(domain) {
    var parts = splitDomain(domain);
    if (!parts || parts.sld.length < 3) return null;

    // Buscar los mejores SLDs candidatos (distancia < 2.5)
    var sldCandidates = [];
    for (var i = 0; i < KNOWN_SLDS.length; i++) {
      var d = sift3(parts.sld, KNOWN_SLDS[i]);
      if (d < 2.5) sldCandidates.push({ sld: KNOWN_SLDS[i], dist: d });
    }
    sldCandidates.sort(function(a,b) { return a.dist - b.dist; });

    // Para cada SLD candidato, buscar el dominio completo en KNOWN_DOMAINS
    // que mejor combine: primero intentar con el TLD original del usuario,
    // luego con el TLD mas comun de ese SLD.
    for (var s = 0; s < sldCandidates.length && s < 3; s++) {
      var sld = sldCandidates[s].sld;

      // 1. Intentar con el TLD exacto del usuario
      var exact = sld + '.' + parts.tld;
      if (exact !== domain && KNOWN_SET.has(exact)) return exact;

      // 2. Intentar con el TLD principal de ese proveedor
      //    (el primero que aparezca en KNOWN_DOMAINS con este SLD)
      for (var k = 0; k < KNOWN_DOMAINS.length; k++) {
        if (KNOWN_DOMAINS[k].substring(0, KNOWN_DOMAINS[k].indexOf('.')) === sld) {
          if (KNOWN_DOMAINS[k] !== domain) return KNOWN_DOMAINS[k];
          break;
        }
      }
    }
    return null;
  }

  // ── Multi-segment strip ────────────────────────────────────
  // Para dominios con 3+ segmentos como gmail.con.com:
  // quitar el ultimo segmento y re-evaluar por el pipeline.
  function tryMultiSegmentStrip(domain) {
    var dots = 0;
    for (var i = 0; i < domain.length; i++) if (domain[i] === '.') dots++;
    if (dots < 2) return null;

    // Quitar el ultimo segmento (.com, .es, etc.) y re-evaluar
    var lastDot = domain.lastIndexOf('.');
    var prefix = domain.substring(0, lastDot);

    // El prefix puede ser un dominio conocido directamente
    if (KNOWN_SET.has(prefix)) return prefix;
    if (TYPO_MAP[prefix]) return TYPO_MAP[prefix];

    // Intentar TLD fix en el prefix
    for (var i = 0; i < TLD_FIXES.length; i++) {
      if (TLD_FIXES[i][0].test(prefix)) {
        var fixed = prefix.replace(TLD_FIXES[i][0], TLD_FIXES[i][1]);
        if (KNOWN_SET.has(fixed)) return fixed;
        if (TYPO_MAP[fixed]) return TYPO_MAP[fixed];
        break;
      }
    }

    // Intentar Sift3 en el prefix
    var sug = suggestDomain(prefix);
    if (sug) return sug;

    return null;
  }

  // ── Sanitizacion silenciosa del email ────────────────────────
  // Limpia caracteres invisibles, espacios internos, mayusculas.
  // Se aplica ANTES de cualquier comprobacion de typos.
  function sanitizeEmail(value) {
    if (!value) return value;
    var s = value;
    // Quitar caracteres invisibles: zero-width space, non-breaking space,
    // zero-width joiner/non-joiner, BOM, soft hyphen, tabs
    s = s.replace(/[\u200B\u200C\u200D\uFEFF\u00AD\u200E\u200F\u202A-\u202E\t]/g, '');
    // Quitar espacios (normales y non-breaking) en cualquier posicion
    s = s.replace(/[\s\u00A0]+/g, '');
    // Minusculas
    s = s.toLowerCase();
    return s;
  }

  // ── Pipeline principal ─────────────────────────────────────
  function checkEmail(value) {
    if (!value || !value.includes('@')) return null;
    var cleaned = sanitizeEmail(value);
    var parts = cleaned.split('@');
    var local = parts[0], rawDomain = parts[1];
    if (!rawDomain || !rawDomain.includes('.')) return null;

    // 0. Si ya es valido, no sugerir nada
    if (KNOWN_SET.has(rawDomain)) return null;

    var domain = rawDomain;

    // 1. Typo exacto en el TYPO_MAP (atajo rapido)
    if (TYPO_MAP[domain]) return local + '@' + TYPO_MAP[domain];

    // 2. Reparar TLD obviamente roto
    for (var i = 0; i < TLD_FIXES.length; i++) {
      if (TLD_FIXES[i][0].test(domain)) {
        domain = domain.replace(TLD_FIXES[i][0], TLD_FIXES[i][1]);
        break;
      }
    }
    if (KNOWN_SET.has(domain)) return local + '@' + domain;
    if (TYPO_MAP[domain])      return local + '@' + TYPO_MAP[domain];

    // 3. Multi-segment strip (gmail.con.com → gmail.con → gmail.com)
    var multiSeg = tryMultiSegmentStrip(rawDomain);
    if (multiSeg) return local + '@' + multiSeg;

    // 4. Garbage tail (gmail.commeil.com, hotmail.cominievrd, etc.)
    //    Probar tanto sobre rawDomain como sobre domain (post TLD-fix)
    var stripped = stripGarbageTail(rawDomain);
    if (stripped !== rawDomain && KNOWN_SET.has(stripped)) {
      return local + '@' + stripped;
    }
    if (domain !== rawDomain) {
      var stripped2 = stripGarbageTail(domain);
      if (stripped2 !== domain && KNOWN_SET.has(stripped2)) {
        return local + '@' + stripped2;
      }
    }

    // 5. SLD+TLD split matching (compound errors: hormail.org, gmial.es)
    var splitSug = suggestSplitMatch(domain);
    if (splitSug) return local + '@' + splitSug;

    // 6. Sift3 como ultimo recurso
    var fix = suggestDomain(domain);
    if (fix) return local + '@' + fix;

    return null;
  }

  // ── UI: sugerencia en tiempo real + autocorreccion en submit ─
  // (variante LIGHT — texto claro)
  function attach(input) {
    if (input.dataset.emailcheck) return;
    input.dataset.emailcheck = '1';

    // Crear hint visual
    var hint = document.createElement('div');
    hint.style.cssText = 'font-size:13px;margin-top:6px;color:#f9fafb;display:none;cursor:pointer;line-height:1.35;font-family:inherit';
    input.insertAdjacentElement('afterend', hint);

    var showHint = function(sug) {
      // Construir el hint con DOM seguro (no innerHTML) para evitar XSS
      // si el local part del email contuviera HTML malicioso
      hint.textContent = '';
      var t1 = document.createTextNode('\u00bfQuisiste decir ');
      var b = document.createElement('b');
      b.style.cssText = 'text-decoration:underline;color:#ffffff';
      b.textContent = sug;
      var t2 = document.createTextNode('? ');
      var span = document.createElement('span');
      span.style.color = '#9ca3af';
      span.textContent = '(haz clic para corregir)';
      hint.appendChild(t1);
      hint.appendChild(b);
      hint.appendChild(t2);
      hint.appendChild(span);
      hint.style.display = 'block';
      hint.onclick = function() {
        input.value = sug;
        input.dispatchEvent(new Event('input', {bubbles:true}));
        input.dispatchEvent(new Event('change', {bubbles:true}));
        hint.style.display = 'none';
      };
    };

    var validate = function() {
      // Sanitizar el campo silenciosamente (espacios, mayusculas, chars invisibles)
      var sanitized = sanitizeEmail(input.value);
      if (sanitized !== input.value) {
        input.value = sanitized;
        input.dispatchEvent(new Event('input', {bubbles:true}));
      }
      var sug = checkEmail(input.value);
      if (sug && sug !== sanitized) {
        showHint(sug);
      } else {
        hint.style.display = 'none';
      }
    };

    // ── Capa 1: sugerencia en tiempo real mientras escribe ────
    // Se activa 400ms despues de que el usuario deja de teclear,
    // solo cuando ya hay un dominio con al menos 2 chars tras el punto
    // (para no sugerir prematuramente con ".co" cuando aun esta
    // escribiendo ".com").
    var debounceTimer = null;
    input.addEventListener('input', function() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() {
        var val = input.value;
        var atIdx = val.indexOf('@');
        if (atIdx < 0) return;
        var domain = val.substring(atIdx + 1);
        var dotIdx = domain.lastIndexOf('.');
        // Solo comprobar si hay al menos 2 chars tras el ultimo punto
        // Asi ".co" no dispara sugerencia mientras escribe ".com"
        if (dotIdx >= 0 && domain.length - dotIdx - 1 >= 2) {
          validate();
        }
      }, 400);
    });

    // Mantener blur/change como fallback
    input.addEventListener('blur', validate);
    input.addEventListener('change', validate);

    // ── Capa 2: autocorreccion silenciosa al pulsar el boton ──
    // Busca el boton de submit del formulario y se engancha a su
    // click. Cuando se pulsa, corrige el email en microsegundos
    // ANTES de que GHL procese el submit. El usuario no ve nada.
    var attachSubmitGuard = function() {
      // Buscar el form padre o el boton de submit mas cercano
      var form = input.closest('form');
      var btn = null;
      if (form) {
        btn = form.querySelector('button[type="submit"], input[type="submit"], button:not([type])');
      }
      // GHL a veces no usa <form> sino divs con un boton
      if (!btn) {
        var parent = input.parentElement;
        while (parent && parent !== document.body) {
          btn = parent.querySelector('button[type="submit"], button.btn-submit, a.btn-submit, button:not([type="button"])');
          if (btn) break;
          parent = parent.parentElement;
        }
      }
      if (!btn || btn.dataset.emailguard) return;
      btn.dataset.emailguard = '1';

      btn.addEventListener('click', function() {
        var emailInputs = (form || document).querySelectorAll('input[data-emailcheck]');
        for (var i = 0; i < emailInputs.length; i++) {
          var inp = emailInputs[i];
          // Paso 0: sanitizar (espacios, mayusculas, chars invisibles)
          var sanitized = sanitizeEmail(inp.value);
          if (sanitized !== inp.value) inp.value = sanitized;
          // Paso 1: autocorregir typo si lo hay
          var sug = checkEmail(inp.value);
          if (sug && sug !== sanitized) {
            inp.value = sug;
          }
          // Notificar a GHL del valor final
          inp.dispatchEvent(new Event('input', {bubbles:true}));
          inp.dispatchEvent(new Event('change', {bubbles:true}));
          // Ocultar hint si estaba visible
          var hintEl = inp.nextElementSibling;
          if (hintEl && hintEl.style && hintEl.onclick) {
            hintEl.style.display = 'none';
          }
        }
      }, true); // useCapture=true para ejecutarse ANTES que el listener de GHL
    };

    // Intentar enganchar ahora y tambien con delay (GHL renderiza async)
    attachSubmitGuard();
    setTimeout(attachSubmitGuard, 500);
    setTimeout(attachSubmitGuard, 1500);
  }

  function scan() {
    document.querySelectorAll('input[type="email"], input[name*="mail" i]').forEach(attach);
  }

  scan();
  new MutationObserver(scan).observe(document.body, {childList:true, subtree:true});
})();
</script>
